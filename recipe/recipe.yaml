schema_version: 1

context:
  name: de-abfallnavi
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/de-abfallnavi-${{ version }}.tar.gz
  sha256: ed44fcbbec6d0a99257210c9e46e1a92332429320117ebfc399d3c8a5642ec03

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry
  run:
    - python >=${{ python_min }}
    - python-dateutil
    - urllib3 >=1.25.3

tests:
  - python:
      imports:
        - deutschland.abfallnavi
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Abfallnavi API
  license: Apache-2.0
  license_file:
    - LICENSE
  homepage: https://github.com/poschi3/abfallnavi-api

extra:
  recipe-maintainers:
    - jan-janssen
